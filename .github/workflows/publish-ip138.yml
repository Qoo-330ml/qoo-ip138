name: Publish ip-138 to PyPI

on:
  push:
    branches:
      - master
    paths:
      - 'ip138/**'
      - 'setup.py'
      - 'setup.cfg'
      - 'requirements.txt'
      - 'MANIFEST.in'
      - 'README.rst'
      - '.github/workflows/publish-ip138.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository (no checkout action)
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" repo
          cd repo
          git checkout "${{ github.sha }}"

      - name: Show Python version
        run: python3 --version

      - name: Install dependencies
        working-directory: repo
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade build twine setuptools wheel packaging

      - name: Build package
        working-directory: repo
        run: |
          python3 -m build

      - name: Check package
        working-directory: repo
        run: |
          python3 -m twine check dist/*

      - name: Publish to PyPI
        working-directory: repo
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN_IP_138 }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "PYPI token is empty. Please set repository secret PYPI_API_TOKEN_IP_138"
            exit 1
          fi
          python3 -m twine upload --verbose --skip-existing dist/*
